server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # ─── Content Security Policy ────────────────────────────────────────────────
    # This header is set here so it takes precedence over any header that
    # Coolify / Traefik may inject (Traefik only adds if the header is absent).
    add_header Content-Security-Policy "
        default-src 'self';
        script-src  'self' 'unsafe-inline';
        style-src   'self' 'unsafe-inline' https://fonts.googleapis.com;
        font-src    'self' data: https://fonts.gstatic.com;
        img-src     'self' data: https: blob:;
        connect-src 'self'
                    https://*.supabase.co
                    wss://*.supabase.co
                    https://api.vapi.ai
                    wss://api.vapi.ai
                    https://*.vapi.ai
                    wss://*.vapi.ai;
        media-src   'self' blob:;
        worker-src  'self' blob:;
        object-src  'none';
        frame-ancestors 'self';
        form-action 'self';
        base-uri    'self';
    " always;

    # ─── Other security headers ──────────────────────────────────────────────────
    add_header X-Frame-Options       "SAMEORIGIN"  always;
    add_header X-Content-Type-Options "nosniff"    always;
    add_header X-XSS-Protection      "1; mode=block" always;
    add_header Referrer-Policy       "strict-origin-when-cross-origin" always;

    # ─── Gzip ───────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript
               application/javascript application/json application/xml+rss;

    # ─── SPA routing ────────────────────────────────────────────────────────────
    # Every path (including /) serves index.html so the React router takes over.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ─── Static assets — cache aggressively ────────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ─── HTML — never cache ─────────────────────────────────────────────────────
    location ~* \.html$ {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}
